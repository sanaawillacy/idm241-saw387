<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Build: Robinhood Log In Button</title>


<style>
    *{
        margin:0;
        padding:0;
        box-sizing: border-box;
    }

    body{
        font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        background-color: #000000;
        height:100vh;
    }

    .main_container{
        display:flex;
        justify-content:center;
        align-items:flex-start;
        padding-top:30px;
        gap: 15px;
    }

    .button{
        text-decoration: none;
        padding: 10px 24px;
        border-radius: 8px;
        font-weight:bold;
        transition: all 0.3s ease;
    }

    .login{
        background-color: black;
       border:2px solid rgb(204,255,0);
       color: rgb(204, 255, 0);
    }

    .login_hover{
        background-color: black;
        border: 1px solid rgb(204, 255, 0);
        color: rgb(204, 255, 0);
        opacity: 0.85;
    }

    .signup{
        background-color: #000000;
        border:2px solid rgb(204,255,0);
    }

    .signup_hover{
        background-color: black;
        border: 1px solid rgb(204, 255, 0);
        color: rgb(204, 255, 0);
        opacity: 0.85;
    }
</style>
</head>
<body>

<div class ="main_container">
    <a href="https://robinhood.com/login/" class="button login">Log In</a>
    <a href="https://robinhood.com/signup/" class="button signup">Sign Up</a>
</div>
